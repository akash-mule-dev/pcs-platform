version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pcs-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcs-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcs-backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pcs-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcs-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pcs-network

volumes:
  postgres_data:

networks:
  pcs-network:
    driver: bridge
