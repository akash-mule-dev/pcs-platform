<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AR QA Inspector</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#fff;overflow:hidden;width:100vw;height:100vh;touch-action:none}

#ar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:none;pointer-events:none}
#status-bar{position:absolute;top:env(safe-area-inset-top,40px);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.75);padding:10px 20px;border-radius:25px;font-size:13px;font-weight:600;
  text-align:center;white-space:nowrap;transition:all 0.3s;pointer-events:none}
#controls{position:absolute;bottom:30px;left:0;right:0;display:flex;justify-content:center;gap:10px;
  padding:0 16px;pointer-events:auto;flex-wrap:wrap}
.btn{padding:12px 18px;border:none;border-radius:12px;font-size:13px;font-weight:700;
  color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:0.5px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all 0.2s}
.btn:active{transform:scale(0.95)}
.btn-lock{background:rgba(21,101,192,0.9)}
.btn-lock.locked{background:rgba(46,125,50,0.9)}
.btn-xray{background:rgba(100,100,100,0.8)}
.btn-xray.active{background:rgba(0,150,136,0.9)}
.btn-scale{background:rgba(0,0,0,0.5);padding:12px 16px;font-size:18px}
.btn-close{background:rgba(198,40,40,0.8)}

#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#1a1a2e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100}
#start-screen h1{font-size:28px;margin-bottom:8px}
#start-screen p{color:#aaa;text-align:center;margin-bottom:24px;line-height:1.6}
.steps{background:rgba(255,255,255,0.08);border-radius:12px;padding:16px;width:100%;max-width:400px;margin-bottom:24px}
.step{padding:6px 0;font-size:14px}
.step b{color:#64b5f6}
#start-btn{background:#1565c0;color:#fff;border:none;padding:16px 32px;border-radius:12px;
  font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
#start-btn:disabled{opacity:0.5}
#no-ar{display:none;color:#ef5350;margin-top:16px;text-align:center;font-size:14px}
</style>
</head>
<body>

<div id="start-screen">
  <h1>AR QA Inspector</h1>
  <p>Place the 3D model on your real product<br>and walk around to inspect quality.</p>
  <div class="steps">
    <div class="step"><b>1.</b> Tap anywhere to place the model</div>
    <div class="step"><b>2.</b> Tap again to reposition</div>
    <div class="step"><b>3.</b> Tap <b>LOCK</b> to anchor it</div>
    <div class="step"><b>4.</b> Tap <b>X-RAY</b> for edge inspection</div>
    <div class="step"><b>5.</b> Walk around to inspect all sides</div>
  </div>
  <button id="start-btn" disabled>Checking AR support...</button>
  <div id="no-ar"></div>
</div>

<div id="ar-overlay">
  <div id="status-bar">Loading...</div>
  <div id="controls">
    <button class="btn btn-xray" id="btn-xray" onclick="toggleXray()" style="display:none">X-RAY</button>
    <button class="btn btn-lock" id="btn-lock" onclick="toggleLock()" style="display:none">LOCK</button>
    <button class="btn btn-scale" id="btn-plus" onclick="adjustScale(1.2)" style="display:none">+</button>
    <button class="btn btn-scale" id="btn-minus" onclick="adjustScale(0.83)" style="display:none">&minus;</button>
    <button class="btn btn-close" onclick="endSession()">&times; Exit</button>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let renderer, scene, camera, xrSession, xrRefSpace, xrHitTestSource;
let model = null, reticle = null;
let isLocked = false, isXray = false, isPlaced = false;
let edgeLines = [], originalMaterials = new Map();
const loader = new GLTFLoader();

const params = new URLSearchParams(location.search);
const modelUrl = params.get('url');

// ── Check AR ──
const startBtn = document.getElementById('start-btn');
const noAr = document.getElementById('no-ar');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-ar').then(ok => {
    if (ok) {
      startBtn.textContent = 'Start AR Session';
      startBtn.disabled = false;
      startBtn.onclick = startAR;
    } else {
      startBtn.textContent = 'AR Not Supported';
      noAr.style.display = 'block';
      noAr.textContent = 'WebXR AR not available. Use Chrome on an ARCore device.';
    }
  });
} else {
  startBtn.textContent = 'WebXR Not Available';
  noAr.style.display = 'block';
  noAr.textContent = 'WebXR not available in this browser.';
}

function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const d1 = new THREE.DirectionalLight(0xffffff, 1.0);
  d1.position.set(2, 4, 3); scene.add(d1);
  const d2 = new THREE.DirectionalLight(0x88aaff, 0.3);
  d2.position.set(-3, 1, -2); scene.add(d2);

  // Reticle
  const ring = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
  reticle = new THREE.Mesh(ring, new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.8 }));
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);
}

async function startAR() {
  initThree();
  document.getElementById('start-screen').style.display = 'none';

  try {
    const overlay = document.getElementById('ar-overlay');
    overlay.style.display = 'block';

    // Try with DOM overlay first, fall back without it
    let sessionInit = {
      requiredFeatures: ['hit-test', 'local-floor'],
      optionalFeatures: ['anchors'],
    };
    try {
      // Attempt with dom-overlay for UI controls on top of AR
      xrSession = await navigator.xr.requestSession('immersive-ar', {
        ...sessionInit,
        optionalFeatures: ['dom-overlay', 'anchors'],
        domOverlay: { root: overlay }
      });
    } catch {
      // Fallback: no DOM overlay
      xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
    }

    xrSession.addEventListener('end', onSessionEnd);
    await renderer.xr.setSession(xrSession);
    xrRefSpace = await xrSession.requestReferenceSpace('local-floor');

    const viewerSpace = await xrSession.requestReferenceSpace('viewer');
    xrHitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

    xrSession.addEventListener('select', onSelect);

    setStatus('Loading model...');
    loadModel();

    renderer.setAnimationLoop(onXRFrame);
  } catch (e) {
    setStatus('AR Error: ' + e.message);
  }
}

// ── Frame Loop ──
let lastHitPose = null;

function onXRFrame(timestamp, frame) {
  if (!frame) return;

  if (xrHitTestSource) {
    const hits = frame.getHitTestResults(xrHitTestSource);
    if (hits.length > 0) {
      const pose = hits[0].getPose(xrRefSpace);
      if (pose) {
        lastHitPose = pose;
        if (!isPlaced) {
          reticle.visible = true;
          reticle.matrix.fromArray(pose.transform.matrix);
        }
      }
    }
  }

  renderer.render(scene, camera);
}

// ── Tap to Place ──
function onSelect() {
  if (!model) {
    setStatus('Model still loading...');
    return;
  }
  if (isPlaced && isLocked) return;

  // Use last hit-test pose, or place 1.5m in front of camera
  let position, matrix;
  if (lastHitPose) {
    const p = lastHitPose.transform.position;
    position = new THREE.Vector3(p.x, p.y, p.z);
  } else {
    // Fallback: place in front of camera
    const cam = renderer.xr.getCamera();
    const dir = new THREE.Vector3(0, 0, -1.5).applyQuaternion(cam.quaternion);
    position = cam.position.clone().add(dir);
    position.y = cam.position.y - 0.5; // slightly below eye level
  }

  model.position.copy(position);

  // Face camera
  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  model.lookAt(camPos.x, model.position.y, camPos.z);

  if (!isPlaced) {
    scene.add(model);
    isPlaced = true;
    reticle.visible = false;
    showControls();
    setStatus('Model placed! Tap to reposition, or LOCK.');
  } else {
    setStatus('Repositioned. Tap LOCK to anchor.');
  }
}

// ── Load Model ──
function loadModel() {
  if (!modelUrl) { setStatus('No model URL'); return; }

  loader.load(modelUrl,
    (gltf) => {
      model = gltf.scene;

      // Center at base, keep real-world scale (GLB units = meters)
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.set(-center.x, -box.min.y, -center.z);

      // Wrap in group so position.set works cleanly later
      const wrapper = new THREE.Group();
      wrapper.add(model);
      model = wrapper;

      // Store originals
      model.traverse(c => {
        if (c.isMesh) originalMaterials.set(c.uuid, c.material.clone());
      });

      setStatus('Tap anywhere to place the model');
    },
    (p) => {
      if (p.total > 0) setStatus('Downloading... ' + Math.round(p.loaded / p.total * 100) + '%');
    },
    (err) => { setStatus('Load error: ' + err.message); }
  );
}

// ── Lock ──
window.toggleLock = function() {
  if (!isPlaced) return;
  isLocked = !isLocked;
  const btn = document.getElementById('btn-lock');
  btn.textContent = isLocked ? 'UNLOCK' : 'LOCK';
  btn.classList.toggle('locked', isLocked);
  document.getElementById('btn-plus').style.display = isLocked ? 'none' : 'flex';
  document.getElementById('btn-minus').style.display = isLocked ? 'none' : 'flex';

  if (isLocked) {
    setStatus('LOCKED \u2014 Walk around to inspect');
    document.getElementById('status-bar').style.background = 'rgba(46,125,50,0.85)';
  } else {
    setStatus('Unlocked \u2014 Tap to reposition');
    document.getElementById('status-bar').style.background = 'rgba(0,0,0,0.75)';
  }
};

// ── X-Ray ──
window.toggleXray = function() {
  if (!model) return;
  isXray = !isXray;
  const btn = document.getElementById('btn-xray');
  btn.textContent = isXray ? 'SOLID' : 'X-RAY';
  btn.classList.toggle('active', isXray);

  edgeLines.forEach(l => { l.parent?.remove(l); l.geometry.dispose(); l.material.dispose(); });
  edgeLines = [];

  model.traverse(c => {
    if (!c.isMesh) return;
    if (isXray) {
      if (!originalMaterials.has(c.uuid)) originalMaterials.set(c.uuid, c.material.clone());
      c.material = new THREE.MeshStandardMaterial({
        color: 0x1e88e5, transparent: true, opacity: 0.06,
        depthWrite: false, side: THREE.DoubleSide, roughness: 0.8, metalness: 0.1
      });
      c.renderOrder = 0;
      const edges = new THREE.EdgesGeometry(c.geometry, 25);
      const ls = new THREE.LineSegments(edges,
        new THREE.LineBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 1.0 }));
      ls.renderOrder = 1;
      c.add(ls);
      edgeLines.push(ls);
    } else {
      const o = originalMaterials.get(c.uuid);
      if (o) c.material = o.clone();
      c.renderOrder = 0;
    }
  });

  setStatus(isXray ? 'X-RAY \u2014 Edges visible for QA' : (isLocked ? 'LOCKED \u2014 Walk around' : 'Solid view'));
};

// ── Scale ──
window.adjustScale = function(f) {
  if (!model || isLocked) return;
  model.scale.multiplyScalar(f);
};

// ── UI ──
function setStatus(t) { document.getElementById('status-bar').textContent = t; }
function showControls() {
  ['btn-lock','btn-xray','btn-plus','btn-minus'].forEach(id =>
    document.getElementById(id).style.display = 'flex');
}

window.endSession = function() {
  if (xrSession) xrSession.end();
  else { window.close(); history.back(); }
};

function onSessionEnd() {
  xrSession = null;
  renderer?.setAnimationLoop(null);
  renderer?.domElement.remove();
  renderer?.dispose();
  document.getElementById('ar-overlay').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}
</script>
</body>
</html>
