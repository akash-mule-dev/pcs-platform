<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/models"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ modelName }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="resetCamera()">
        <ion-icon name="locate-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="viewer-wrapper" #container>
    <canvas #canvas></canvas>

    <div class="loading-overlay" *ngIf="loading">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
      <ion-text color="light" class="loading-label">Loading 3D Model...</ion-text>
      <div class="progress-container" *ngIf="loadProgress >= 0">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="loadProgress"></div>
        </div>
        <ion-text color="light" class="progress-text">{{ loadProgress }}%</ion-text>
      </div>
      <ion-text color="medium" class="progress-bytes" *ngIf="loadedBytes">{{ loadedBytes }}</ion-text>
    </div>

    <div class="error-overlay" *ngIf="error">
      <ion-icon name="alert-circle-outline" color="danger" style="font-size:48px;"></ion-icon>
      <ion-text color="danger">{{ error }}</ion-text>
    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="tertiary" (click)="openAR()">
      <ion-icon name="scan-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
