<ion-header>
  <ion-toolbar color="primary">
    <ion-title>3D Models</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="loadModels()">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [(ngModel)]="filterType" (ionChange)="loadModels()">
      <ion-segment-button value="">All</ion-segment-button>
      <ion-segment-button value="assembly">Assembly</ion-segment-button>
      <ion-segment-button value="quality">Quality</ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadModels($any($event))">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item *ngFor="let model of models" (click)="openModel(model)" button detail>
      <ion-icon name="cube-outline" slot="start" color="primary" style="font-size:28px;"></ion-icon>
      <ion-label>
        <h2>{{ model.name }}</h2>
        <p>{{ model.product?.name || 'No product linked' }}</p>
        <p>
          <ion-text color="medium">{{ formatSize(model.fileSize) }}</ion-text>
          &middot;
          <ion-text [color]="model.modelType === 'quality' ? 'success' : 'tertiary'">
            {{ model.modelType | uppercase }}
          </ion-text>
        </p>
      </ion-label>
      <ion-icon name="scan-outline" slot="end" color="tertiary"></ion-icon>
    </ion-item>
  </ion-list>

  <ion-text color="medium" class="ion-text-center ion-padding" *ngIf="models.length === 0">
    <p>No 3D models available. Upload models from the web dashboard.</p>
  </ion-text>
</ion-content>
