appId: com.fabrixr.pcs
name: "3D Models Screen"
---

# Ensure app is launched and logged in
- launchApp

- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn: "Enter your email"
      - inputText: "admin@pcs.com"
      - tapOn: "Enter your password"
      - inputText: "123456"
      - tapOn: "Sign In"

# Navigate to Models tab
- tapOn: "3D/AR"

# Verify model list screen
- extendedWaitUntil:
    visible: "3D Models"
    timeout: 5000

# Verify filter chips are visible
- assertVisible: "All"
- assertVisible: "Assembly"
- assertVisible: "Quality"

# Test filter switching
- tapOn: "Assembly"
- tapOn: "Quality"
- tapOn: "All"
