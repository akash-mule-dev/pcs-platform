appId: com.fabrixr.pcs
name: "Login Flow"
---

# Launch the app
- launchApp

# If already logged in, logout first
- runFlow:
    when:
      visible: "Profile"
    commands:
      - tapOn: "Profile"
      - tapOn: "Logout"
      - tapOn: "LOGOUT"
      - extendedWaitUntil:
          visible: "Sign In"
          timeout: 5000

# Verify login screen is visible
- assertVisible: "FabriXR"
- assertVisible: "Production control for fabrication"
- assertVisible: "Sign In"

# Test empty submission shows error
- tapOn: "Sign In"
- assertVisible: "Please enter email and password"
- tapOn: "OK"

# Enter valid credentials
- tapOn: "Enter your email"
- inputText: "admin@pcs.com"
- tapOn: "Enter your password"
- inputText: "123456"
- tapOn: "Sign In"

# Verify we land on the dashboard
- extendedWaitUntil:
    visible: "Today's Stats"
    timeout: 10000
- assertVisible: "Quick Actions"
