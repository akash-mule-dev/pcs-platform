appId: com.fabrixr.pcs
name: "Profile Screen"
---

# Ensure app is launched and logged in
- launchApp

- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn: "Enter your email"
      - inputText: "admin@pcs.com"
      - tapOn: "Enter your password"
      - inputText: "123456"
      - tapOn: "Sign In"

# Navigate to Profile tab
- tapOn: "Profile"

# Verify user profile info is displayed
- assertVisible: "Employee ID"
- assertVisible: "Email"
- assertVisible: "admin@pcs.com"

# Verify weekly stats section
- assertVisible: "This Week"
- assertVisible: "Stages Done"
- assertVisible: "Avg / Stage"
- assertVisible: "Efficiency"

# Verify logout button exists
- assertVisible: "Logout"

# Test logout flow
- tapOn: "Logout"
- assertVisible: "Are you sure you want to log out?"
- tapOn: "Cancel"

# Verify we're still on profile
- assertVisible: "Logout"
