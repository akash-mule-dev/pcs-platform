appId: com.fabrixr.pcs
name: "Timer Screen"
---

# Ensure app is launched and logged in
- launchApp

- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn: "Enter your email"
      - inputText: "admin@pcs.com"
      - tapOn: "Enter your password"
      - inputText: "123456"
      - tapOn: "Sign In"

# Navigate to Timer tab
- tapOn: "Timer"

# Verify timer screen is shown
- extendedWaitUntil:
    visible: "Timer"
    timeout: 5000

# Test navigation to history
- tapOn: "View History"
- assertVisible: "History"

# Go back to timer
- back

# Verify timer screen again
- assertVisible: "Timer"
